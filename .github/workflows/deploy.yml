name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: production

    steps:
      - name: Trigger Render deploy
        run: curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # The hook only QUEUES a deploy — poll /health until the new
      # instance answers, or fail the deployment after ~5 minutes.
      - name: Wait for healthy deploy
        env:
          HEALTH_URL: ${{ secrets.HEALTH_CHECK_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "HEALTH_CHECK_URL not set — skipping health check."
            exit 0
          fi
          echo "Waiting for the service to come up ..."
          sleep 30
          for i in $(seq 1 20); do
            if curl --fail --silent --max-time 10 "$HEALTH_URL"; then
              echo "Healthy."
              exit 0
            fi
            echo "Attempt $i failed — retrying in 15s"
            sleep 15
          done
          echo "Service never became healthy."
          exit 1
