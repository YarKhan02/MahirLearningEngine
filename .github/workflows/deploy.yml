name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: production

    steps:
      # No-op until hosting is wired up: add the RENDER_DEPLOY_HOOK secret
      # (Render → service → Settings → Deploy Hook) and this deploys for real.
      - name: Trigger Render deploy
        id: trigger
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not configured — skipping deploy."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl --fail -X POST "$HOOK"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      # The hook only QUEUES a deploy — poll /health until the new
      # instance answers, or fail the deployment after ~5 minutes.
      - name: Wait for healthy deploy
        if: steps.trigger.outputs.deployed == 'true' && vars.HEALTH_CHECK_URL != ''
        run: |
          echo "Waiting for ${{ vars.HEALTH_CHECK_URL }} ..."
          sleep 30
          for i in $(seq 1 20); do
            if curl --fail --silent --max-time 10 "${{ vars.HEALTH_CHECK_URL }}"; then
              echo "Healthy."
              exit 0
            fi
            echo "Attempt $i failed — retrying in 15s"
            sleep 15
          done
          echo "Service never became healthy."
          exit 1
