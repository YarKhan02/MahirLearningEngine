version: "2"

# errcheck, govet, ineffassign, staticcheck, unused are enabled by default in v2.
linters:
  enable:
    - bodyclose
    - misspell
    - gocritic
  settings:
    errcheck:
      # Idiomatic unchecked calls: deferred cleanup where the error is unusable.
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*github.com/YarKhan02/MahirLearningEngine/internal/infrastructure/redis.RedisClient).Close
